services:
  app:
    build: .
    container_name: app
    restart: unless-stopped
    ports:
      - "8085:3000"
    volumes:
      # Persist the SQLite database across container rebuilds
      - db-data:/app/prisma
      # Persist uploaded images across container rebuilds
      - uploads-data:/app/public/uploads
    environment:
      - NODE_ENV=production
      # Add any env vars you need:
      # - ADMIN_PASSWORD=your-secure-password
    # Optional: connect to existing Docker network for Nginx
    # networks:
    #   - your-nginx-network

# networks:
#   your-nginx-network:
#     external: true

volumes:
  db-data:
  uploads-data: